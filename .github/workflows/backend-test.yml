name: backend-test

on:
  push:
    branches: [main]
    paths:
      - 'backend/gateway/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'backend/gateway/**'
      - '.github/workflows/backend-test.yml'

jobs:
  gateway:
    name: gateway test + vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/gateway/go.mod

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            git status --short -- go.mod go.sum
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race detector, no cache)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -trimpath -o /tmp/gateway .
