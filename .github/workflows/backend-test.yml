name: backend-test

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'

jobs:
  nakama:
    name: nakama build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/nakama
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: true
          cache-dependency-path: backend/nakama/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
