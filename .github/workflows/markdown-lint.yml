name: markdown-lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint.json'
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint.json'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            ROADMAP.md
            CONTRIBUTING.md
            SECURITY.md
            AGENTS.md
            .claude/CLAUDE.md
            docs/**/*.md
